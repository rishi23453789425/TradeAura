version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tradeaura_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradeaura
      POSTGRES_PASSWORD: tradeaura_pass
      POSTGRES_DB: tradeaura
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeaura"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradeaura_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: tradeaura_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradeaura_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradeaura_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://tradeaura:tradeaura_pass@postgres:5432/tradeaura
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_super_secret_jwt_key_change_this
      VITE_API_URL: http://localhost:5000
      VITE_WS_URL: ws://localhost:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - tradeaura_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: tradeaura_frontend
    restart: unless-stopped
    ports:
      - "3000:5173"
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_WS_URL: ws://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - tradeaura_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tradeaura_network:
    driver: bridge
